<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Work | Agustin Andorno</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-header">
  <a class="logo" href="index.html">
    <span>AGUSTÍN</span>
    <span class="surname">ANDORNO</span>
  </a>

  <nav>
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="mailto:tuemail@gmail.com">Contact</a>
  </nav>
</header>

<main class="work-slider">

  <button class="work-arrow left" onclick="previousProject()">
    &#8249;
  </button>

  <section class="work-project active-project">
    <div class="work-images">
      <img src="DSCF1948.jpg" alt="">
      <img src="DSCF2049-2.jpg" alt="">
      <img src="DSCF1960.jpg" alt="">
      <img src="DSCF1958-4.jpg" alt="">
      <img src="DSCF1967.jpg" alt="">
      <img src="DSCF2043.jpg" alt="">
      <img src="DSCF2041-2.jpg" alt="">
      <img src="DSCF2046-2.jpg" alt="">
      
    </div>
  </section>

  <button class="work-arrow right" onclick="nextProject()">
    &#8250;
  </button>

</main>

    <p class="work-caption">
      Reportage photographique du chantier de la Tour Triangle,Herzog & de Meuron. SÉRIE CHANTIER c. 2026
    </p>
  
<script>
  const slider = document.querySelector(".work-slider");

  function nextProject() {
    slider.scrollBy({
      left: window.innerWidth * 0.8,
      behavior: "smooth"
    });
  }

  function previousProject() {
    slider.scrollBy({
      left: -window.innerWidth * 0.8,
      behavior: "smooth"
    });
  }
</script>
  
</body>
</html>
