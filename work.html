<div class="work-series">

  <main class="work-slider">

    </section>

    <button class="work-arrow right" onclick="nextProject(this)">
  &#8250;

<div class="work-series">

  <main class="work-slider">

    <button class="work-arrow left" onclick="previousProject(this)">
  &#8249;
</button>

    <section class="work-project">

      <div class="work-images">
        <img src="FOTO_01.jpg" alt="">
        <img src="FOTO_02.jpg" alt="">
        <img src="FOTO_03.jpg" alt="">
        <img src="FOTO_04.jpg" alt="">
      </div>

  &#8250;
</button>

  </main>

  <p class="work-caption">
    Nombre del proyecto. Arquitecto. Año.
  </p>
</div>
  
<script>
  function nextProject(button) {
    const slider = button.closest(".work-series").querySelector(".work-slider");

    slider.scrollBy({
      left: window.innerWidth * 0.8,
      behavior: "smooth"
    });
  }

  function previousProject(button) {
    const slider = button.closest(".work-series").querySelector(".work-slider");

    slider.scrollBy({
      left: -window.innerWidth * 0.8,
      behavior: "smooth"
    });
  }
</script>
